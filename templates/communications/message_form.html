{% extends "base.html" %}
{% block title %}New message{% endblock %}
{% block content %}
<h1>Send a message</h1>
<form method="post">
  {% csrf_token %}
  {% for field in form %}
    <div class="mb-3">
      {{ field.label_tag }} {{ field }}
      {{ field.errors }}
    </div>
  {% endfor %}
  <button type="submit" class="btn btn-success">Send</button>
</form>
{% endblock %}
