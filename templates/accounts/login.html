{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="auth-card">

        <h2 class="auth-title text-light">Welcome back</h2>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label text-light fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    <div class="text-danger small">{{ field.errors }}</div>
                </div>
            {% endfor %}

            <button class="btn btn-primary auth-btn">Login</button>
        </form>

    </div>
</div>
{% endblock %}
